<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guía de uso del datáfono — ePayco</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0f172a; color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100%; }
    /* 100dvh can mis-compute during native fullscreen transitions; 100% inherits correctly */
    :fullscreen      .app { height: 100vh; }
    :-webkit-full-screen .app { height: 100vh; }
    :-moz-full-screen    .app { height: 100vh; }

    /* ── Header ── */
    .header { flex-shrink: 0; background: #1e293b; border-bottom: 1px solid #1e3a5f;
      padding: 11px 20px; }
    .hl { font-size: 1.1rem; font-weight: 700; color: #00c6b8; }
    .hl span { color: #e2e8f0; font-weight: 300; }
    .hs { font-size: .7rem; color: #64748b; margin-top: 1px; }

    /* ── Viewer ── */
    .viewer { flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 12px 52px; }

    /* Book wrap — sized by JS */
    #bookWrap { position: relative; display: flex; align-items: center;
      justify-content: center;
      transition: clip-path .35s ease, transform .35s ease; }

    /* StPageFlip injects a canvas here — keep container clean */
    #flipbook { display: block; }

    /* StPageFlip canvas (dark theme background behind pages) */
    #flipbook canvas { display: block; }

    /* Loading overlay */
    #loading { position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0f172a;
      gap: 14px; font-size: .9rem; color: #94a3b8; z-index: 20; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1e3a5f;
      border-top-color: #00c6b8; border-radius: 50%;
      animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Arrows ── */
    .arrow { position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 10; width: 40px; height: 40px;
      background: rgba(15,23,42,.85); border: 1px solid #1e3a5f;
      border-radius: 50%; cursor: pointer; color: #94a3b8;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
      backdrop-filter: blur(6px); }
    .arrow:hover { background: #1e293b; color: #00c6b8; border-color: #00c6b8; }
    .arrow[disabled] { opacity: .2; pointer-events: none; }
    .arrow-l { left: 6px; } .arrow-r { right: 6px; }
    .arrow svg { width: 18px; height: 18px; stroke: currentColor; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Bottom ── */
    .bottom { flex-shrink: 0; background: #1e293b; border-top: 1px solid #1e3a5f;
      padding: 7px 16px 9px; display: flex; flex-direction: column; gap: 7px; }
    .ctrl-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .cb { background: none; border: none; cursor: pointer; color: #64748b;
      width: 30px; height: 30px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s; }
    .cb:hover { color: #00c6b8; background: #0f172a; }
    .cb[disabled] { opacity: .2; pointer-events: none; }
    .cb svg { width: 19px; height: 19px; fill: currentColor; }
    .counter { font-size: .8rem; color: #94a3b8; min-width: 72px; text-align: center; }
    .vl { width: 1px; height: 16px; background: #1e3a5f; margin: 0 2px; }

    /* Thumbnails */
    .thumbs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    .thumbs::-webkit-scrollbar { height: 3px; }
    .thumbs::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    .thumb { flex-shrink: 0; width: 44px; height: 44px; border-radius: 3px;
      overflow: hidden; cursor: pointer; border: 2px solid transparent; opacity: .45;
      transition: opacity .15s, border-color .15s; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb:hover { opacity: .8; border-color: #00c6b8; }
    .thumb.active { opacity: 1; border-color: #00c6b8; }

    @media (max-width: 480px) {
      .viewer { padding: 8px 44px; }
      .thumb  { width: 36px; height: 36px; }
      .arrow  { width: 34px; height: 34px; }
      .arrow-l { left: 2px; } .arrow-r { right: 2px; }
    }

    /* Landscape on small screens: hide thumbnails to maximise book area */
    @media (max-height: 500px) {
      .thumbs  { display: none; }
      .bottom  { padding-top: 4px; padding-bottom: 5px; gap: 0; }
      .viewer  { padding-top: 4px; padding-bottom: 4px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="hl">ePayco <span>Datáfono</span></div>
    <div class="hs">Guía de uso del datáfono</div>
  </header>

  <div class="viewer" id="viewer">
    <div id="loading">
      <div class="spinner"></div>
      Cargando guía…
    </div>

    <div id="bookWrap">
      <!-- StPageFlip renderiza aquí — debe estar vacío -->
      <div id="flipbook"></div>
    </div>

    <button class="arrow arrow-l" id="arrowL" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <button class="arrow arrow-r" id="arrowR">
      <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
    </button>
  </div>

  <div class="bottom">
    <div class="ctrl-row">
      <button class="cb" id="btnFirst" disabled title="Primera página">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="cb" id="btnPrev" disabled title="Anterior">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <span class="counter" id="counter">— / —</span>
      <button class="cb" id="btnNext" title="Siguiente">
        <svg viewBox="0 0 24 24"><path d="M10 6 8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <button class="cb" id="btnLast" title="Última página">
        <svg viewBox="0 0 24 24"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></svg>
      </button>
      <div class="vl"></div>
      <button class="cb" id="btnFs" title="Pantalla completa">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zm-3-12v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </div>

</div>

<!-- StPageFlip — canvas-based realistic page turn -->
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<script>
const TOTAL  = 18;
const SRC_PX = 985; // source image width = height (all pages are 985×985 px)
const SRCS   = Array.from({length: TOTAL}, (_, i) =>
  `pages/page-${String(i + 1).padStart(2, '0')}.jpg`);

// Pre-load all pages into memory at startup. This keeps strong JS references so
// the browser cannot evict them from cache, ensuring instant reinits on resize/rotate.
const _imgCache = SRCS.map(src => { const img = new Image(); img.src = src; return img; });

// Force Lanczos/bicubic quality when StPageFlip scales source images into the canvas.
// Without this, browsers default to low-quality bilinear on drawImage downscale.
{
  const _oc = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function(t, o) {
    const ctx = _oc.call(this, t, o);
    if (ctx && t === '2d') { ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high'; }
    return ctx;
  };
}

const viewer   = document.getElementById('viewer');
const bookWrap = document.getElementById('bookWrap');
const flipEl   = document.getElementById('flipbook');
const loading  = document.getElementById('loading');
const counter  = document.getElementById('counter');
const arrowL   = document.getElementById('arrowL');
const arrowR   = document.getElementById('arrowR');
const btnFirst = document.getElementById('btnFirst');
const btnPrev  = document.getElementById('btnPrev');
const btnNext  = document.getElementById('btnNext');
const btnLast  = document.getElementById('btnLast');
const btnFs    = document.getElementById('btnFs');
const thumbsEl = document.getElementById('thumbs');

let pf                 = null;
let pfGraveyard        = []; // old instances waiting to be destroyed after new one loads
let initDone           = false;
let fsActive           = false;
let fsTransition       = false; // true during fullscreen enter/exit — blocks resize reinit
let isPortrait         = false;
let _dpr      = 1;       // device pixel ratio at last calcSz()
let _szVisual = 80;      // CSS visual page size (≤ SRC_PX / _dpr)
let _sz       = SRC_PX; // active canvas buffer size = min(SRC_PX, round(_szVisual × _dpr))

/* ── Thumbnails ── */
SRCS.forEach((src, i) => {
  const d = document.createElement('div');
  d.className = 'thumb';
  d.title = `Página ${i + 1}`;
  const img = document.createElement('img');
  img.src = src; img.alt = ''; img.loading = 'lazy';
  d.appendChild(img);
  d.addEventListener('click', () => pf?.flip(i));
  thumbsEl.appendChild(d);
});
const thumbEls = thumbsEl.querySelectorAll('.thumb');

/* ── Page size calc — returns the VISUAL (CSS) page size; updates _dpr + _szVisual ── */
function calcSz() {
  const r   = viewer.getBoundingClientRect();
  const vw  = r.width  > 10 ? r.width  : window.innerWidth;
  const vh  = r.height > 10 ? r.height : window.innerHeight - 140;
  _dpr = window.devicePixelRatio || 1;
  // maxVisual cap: _szVisual × _dpr ≤ SRC_PX → canvas buffer never exceeds source resolution
  const maxVisual = Math.floor(SRC_PX / _dpr);
  let sz;
  if (isPortrait) {
    sz = Math.max(80, Math.floor(Math.min(vw - 100, vh - 80, maxVisual)));
  } else {
    sz = Math.max(80, Math.floor(Math.min(vh - 16, (vw - 8) / 2, maxVisual)));
  }
  _szVisual = sz;
  return sz;
}

/* ── UI update ── */
function updateUI() {
  if (!pf) return;
  const idx = pf.getCurrentPageIndex();

  // In portrait mode every page is shown alone; in landscape last spread is idx 16
  const isFirst = idx <= 0;
  const isLast  = isPortrait ? idx >= TOTAL - 1 : idx >= TOTAL - 2;

  arrowL.disabled = btnFirst.disabled = btnPrev.disabled = isFirst;
  arrowR.disabled = btnLast.disabled  = btnNext.disabled = isLast;

  let label;
  if (isPortrait) {
    label = `${Math.min(idx + 1, TOTAL)} / ${TOTAL}`;
  } else if (isFirst) {
    label = `1 / ${TOTAL}`;
  } else if (isLast) {
    label = `${TOTAL} / ${TOTAL}`;
  } else {
    label = `${idx + 1}–${Math.min(idx + 2, TOTAL)} / ${TOTAL}`;
  }
  counter.textContent = label;

  const visibles = isPortrait
    ? new Set([Math.min(idx, TOTAL - 1)])
    : isFirst  ? new Set([0])
    : isLast   ? new Set([TOTAL - 1])
    :            new Set([idx, idx + 1]);

  thumbEls.forEach((t, i) => t.classList.toggle('active', visibles.has(i)));
  const scrollTo = isFirst ? 0 : isLast ? TOTAL - 1 : idx;
  thumbEls[Math.min(scrollTo, TOTAL - 1)]
    ?.scrollIntoView({inline: 'center', behavior: 'smooth', block: 'nearest'});

  // scale maps the canvas buffer (_sz px) to the intended visual CSS size (_szVisual px).
  // On 1× screens _sz = _szVisual → scale(1) = no-op (zero aliasing, perfect 1:1 render).
  // On retina screens _sz = _szVisual×_dpr → scale(1/_dpr) — GPU compositor halves/thirds it,
  // yielding _szVisual×_dpr physical px from a _sz-px buffer (near-native, no upscale blur).
  const sc = `scale(${(_szVisual / _sz).toFixed(6)})`;
  if (!isPortrait) {
    if (isFirst) {
      bookWrap.style.clipPath  = 'inset(0 0 0 50%)';
      bookWrap.style.transform = `${sc} translateX(-25%)`;
    } else if (isLast) {
      bookWrap.style.clipPath  = 'inset(0 50% 0 0)';
      bookWrap.style.transform = `${sc} translateX(25%)`;
    } else {
      bookWrap.style.clipPath  = 'inset(0 0 0 0%)';
      bookWrap.style.transform = sc;
    }
  } else {
    bookWrap.style.clipPath  = '';
    bookWrap.style.transform = sc;
  }
}

/* ── Init / reinit StPageFlip ── */
function initFlip() {
  // Detect portrait: viewer taller than wide → single-page mode
  const r  = viewer.getBoundingClientRect();
  const vw = r.width  > 10 ? r.width  : window.innerWidth;
  const vh = r.height > 10 ? r.height : window.innerHeight - 140;
  isPortrait = vw < vh;

  calcSz(); // updates _szVisual and _dpr
  // Canvas buffer = szVisual × dpr, capped at SRC_PX.
  // On 1× screens: sz = szVisual → CSS scale = 1 (no scaling, no aliasing).
  // On retina: sz = szVisual × dpr ≈ SRC_PX → GPU composites down by 1/dpr (sharp).
  const sz = Math.min(SRC_PX, Math.round(_szVisual * _dpr));
  _sz = sz;

  // Reset clip + transform instantly (no animation) before reinit
  bookWrap.style.transition = 'none';
  bookWrap.style.clipPath   = '';
  bookWrap.style.transform  = '';

  flipEl.innerHTML = '';

  // Defer destroy: calling pf.destroy() before loadFromImages on a new instance can
  // silently break the new instance's rendering. Queue the old instance for cleanup
  // and destroy it only after the new instance successfully fires its 'init' event.
  if (pf) {
    pfGraveyard.push(pf);
    pf = null;
  }

  pf = new St.PageFlip(flipEl, {
    width:  sz,
    height: sz,

    size:      'fixed',
    minWidth:  sz,
    minHeight: sz,
    maxWidth:  sz,
    maxHeight: sz,

    showCover:           !isPortrait, // cover trick only needed in landscape
    usePortrait:         isPortrait,  // single-page on portrait devices
    autoSize:            false,
    drawShadow:          true,
    flippingTime:        800,
    maxShadowOpacity:    0.6,
    mobileScrollSupport: false,
    useMouseEvents:      true,
    swipeDistance:       30,
    clickEventForward:   false, // our arrow/button controls handle all navigation
    startZIndex:         0,
  });

  pf.loadFromImages(SRCS);

  pf.on('flip',        updateUI);
  pf.on('changeState', updateUI);

  pf.on('init', () => {
    // New instance is stable — safe to destroy any zombied old instances now
    pfGraveyard.forEach(old => { try { old.destroy(); } catch (_) {} });
    pfGraveyard = [];

    loading.style.display = 'none';
    initDone = true;
    updateUI(); // sets initial scale + clip-path without animation
    requestAnimationFrame(() => { bookWrap.style.transition = ''; }); // re-enable CSS transition
  });
}

/* ── Controls ── */
arrowL.addEventListener  ('click', () => pf?.flipPrev());
arrowR.addEventListener  ('click', () => pf?.flipNext());
btnFirst.addEventListener('click', () => pf?.flip(0));
btnPrev.addEventListener ('click', () => pf?.flipPrev());
btnNext.addEventListener ('click', () => pf?.flipNext());
btnLast.addEventListener ('click', () => pf?.flip(TOTAL - 1));

document.addEventListener('keydown', e => {
  if (!initDone) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') pf?.flipNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   pf?.flipPrev();
  if (e.key === 'Home') pf?.flip(0);
  if (e.key === 'End')  pf?.flip(TOTAL - 1);
});

/* Touch swipe */
let tx = 0;
viewer.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive: true});
viewer.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) dx < 0 ? pf?.flipNext() : pf?.flipPrev();
}, {passive: true});

/* Fullscreen */
btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
});

/* Resize — smart handler: reinit only when necessary, otherwise just update CSS scale */
let resizeTimer;
window.addEventListener('resize', () => {
  if (fsActive || fsTransition) return;
  clearTimeout(resizeTimer);
  // 500ms: gives iOS Safari time to settle viewport dimensions after rotation
  resizeTimer = setTimeout(() => {
    const r   = viewer.getBoundingClientRect();
    const vw  = r.width  > 10 ? r.width  : window.innerWidth;
    const vh  = r.height > 10 ? r.height : window.innerHeight - 140;
    const newIsPortrait = vw < vh;

    if (newIsPortrait !== isPortrait) {
      // Orientation changed — full reinit (usePortrait / showCover must flip)
      const pg = pf?.getCurrentPageIndex() ?? 0;
      initFlip(); // sets isPortrait internally from fresh BoundingClientRect
      pf?.on('init', () => { if (pg > 0) pf.flip(pg); });
      return;
    }

    // Same orientation — recalculate visual size and required buffer
    calcSz(); // updates _szVisual and _dpr
    const newSz = Math.min(SRC_PX, Math.round(_szVisual * _dpr));

    if (pf && newSz <= _sz) {
      // Existing canvas is already large enough — just rescale via CSS transform.
      // No reinit: no blank-screen risk, no loadFromImages call needed.
      bookWrap.style.transition = 'none';
      updateUI();
      requestAnimationFrame(() => { bookWrap.style.transition = ''; });
    } else {
      // Window grew significantly — reinit to get a larger canvas and sharper quality
      const pg = pf?.getCurrentPageIndex() ?? 0;
      initFlip();
      pf?.on('init', () => { if (pg > 0) pf.flip(pg); });
    }
  }, 500);
});

document.addEventListener('fullscreenchange', () => {
  fsActive = !!document.fullscreenElement;
  clearTimeout(resizeTimer);
  // Block resize reinit for 700ms around any fullscreen transition
  fsTransition = true;
  setTimeout(() => { fsTransition = false; }, 700);
  // No initFlip() on enter or exit — existing canvas stays visible
});

/* ── Boot ── */
initFlip();
</script>
</body>
</html>
