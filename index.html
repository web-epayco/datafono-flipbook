<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guía de uso del datáfono — ePayco</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      background: #1e293b;
      border-bottom: 1px solid #1e3a5f;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      font-size: 1.15rem;
      font-weight: 700;
      color: #00c6b8;
    }
    .header-logo span { color: #e2e8f0; font-weight: 300; }
    .header-sub {
      font-size: .72rem;
      color: #64748b;
      margin-top: 1px;
    }

    /* ── Viewer ── */
    .viewer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* click zones */
    .zone {
      position: absolute;
      top: 0; bottom: 0;
      width: 38%;
      z-index: 5;
      cursor: pointer;
    }
    .zone-left  { left: 0; }
    .zone-right { right: 0; }

    /* page frame */
    .book {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-wrap {
      position: relative;
      perspective: 1800px;
    }

    .page-img {
      display: block;
      border-radius: 3px;
      box-shadow:
        0 2px 4px rgba(0,0,0,.4),
        0 8px 24px rgba(0,0,0,.55),
        0 24px 60px rgba(0,0,0,.45),
        4px 0 12px rgba(0,0,0,.3);
      user-select: none;
      -webkit-user-drag: none;
      /* size set by JS */
    }

    /* flip animations */
    .page-wrap.go-next { animation: flipNext .45s ease both; }
    .page-wrap.go-prev { animation: flipPrev .45s ease both; }

    @keyframes flipNext {
      0%   { transform: rotateY(0deg);   opacity: 1; }
      45%  { transform: rotateY(88deg);  opacity: 0; }
      55%  { transform: rotateY(-88deg); opacity: 0; }
      100% { transform: rotateY(0deg);   opacity: 1; }
    }
    @keyframes flipPrev {
      0%   { transform: rotateY(0deg);  opacity: 1; }
      45%  { transform: rotateY(-88deg); opacity: 0; }
      55%  { transform: rotateY(88deg);  opacity: 0; }
      100% { transform: rotateY(0deg);  opacity: 1; }
    }

    /* side arrows */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 40px; height: 40px;
      background: rgba(15,23,42,.85);
      border: 1px solid #1e3a5f;
      border-radius: 50%;
      cursor: pointer;
      color: #94a3b8;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s, transform .15s;
      backdrop-filter: blur(6px);
    }
    .arrow:hover { background: #1e293b; color: #00c6b8; border-color: #00c6b8; transform: translateY(-50%) scale(1.08); }
    .arrow.disabled { opacity: .2; pointer-events: none; }
    .arrow-left  { left: -20px; }
    .arrow-right { right: -20px; }
    .arrow svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Bottom bar ── */
    .bottom {
      flex-shrink: 0;
      background: #1e293b;
      border-top: 1px solid #1e3a5f;
      padding: 8px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #64748b;
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .icon-btn:hover { color: #00c6b8; background: #0f172a; }
    .icon-btn.disabled, .icon-btn:disabled { opacity: .25; pointer-events: none; }
    .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .counter {
      font-size: .82rem;
      color: #94a3b8;
      min-width: 52px;
      text-align: center;
    }

    .divider { width: 1px; height: 18px; background: #1e3a5f; }

    /* thumbnails */
    .thumbs {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scrollbar-color: #1e3a5f transparent;
    }
    .thumbs::-webkit-scrollbar { height: 3px; }
    .thumbs::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .thumb {
      flex-shrink: 0;
      width: 46px; height: 46px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: .45;
      transition: opacity .15s, border-color .15s;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb:hover  { opacity: .8;  border-color: #00c6b8; }
    .thumb.active { opacity: 1;   border-color: #00c6b8; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .thumb { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div>
      <div class="header-logo">ePayco <span>Datáfono</span></div>
      <div class="header-sub">Guía de uso del datáfono</div>
    </div>
  </header>

  <div class="viewer" id="viewer">
    <div class="zone zone-left"  id="zoneLeft"></div>
    <div class="zone zone-right" id="zoneRight"></div>

    <div class="book" id="book">
      <div class="page-wrap" id="pageWrap">
        <img class="page-img" id="pageImg" src="pages/page-01.png" alt="Página 1" draggable="false" />
      </div>

      <button class="arrow arrow-left disabled"  id="arrowLeft">
        <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <button class="arrow arrow-right" id="arrowRight">
        <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
      </button>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-row">
      <!-- first -->
      <button class="icon-btn disabled" id="btnFirst" title="Primera página">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <!-- prev -->
      <button class="icon-btn disabled" id="btnPrev" title="Anterior">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>

      <span class="counter" id="counter">1 / 18</span>

      <!-- next -->
      <button class="icon-btn" id="btnNext" title="Siguiente">
        <svg viewBox="0 0 24 24"><path d="M10 6 8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <!-- last -->
      <button class="icon-btn" id="btnLast" title="Última página">
        <svg viewBox="0 0 24 24"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></svg>
      </button>

      <div class="divider"></div>

      <!-- fullscreen -->
      <button class="icon-btn" id="btnFs" title="Pantalla completa">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zm-3-12v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>

    <div class="thumbs" id="thumbs"></div>
  </div>

</div>
<script>
const TOTAL = 18;
const SRCS  = Array.from({length: TOTAL}, (_, i) =>
  `pages/page-${String(i + 1).padStart(2, '0')}.png`
);

let cur      = 0;
let busy     = false;

const viewer    = document.getElementById('viewer');
const pageWrap  = document.getElementById('pageWrap');
const pageImg   = document.getElementById('pageImg');
const counter   = document.getElementById('counter');
const arrowL    = document.getElementById('arrowLeft');
const arrowR    = document.getElementById('arrowRight');
const btnFirst  = document.getElementById('btnFirst');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const btnLast   = document.getElementById('btnLast');
const btnFs     = document.getElementById('btnFs');
const thumbsEl  = document.getElementById('thumbs');

/* ── Build thumbnails ── */
SRCS.forEach((src, i) => {
  const d   = document.createElement('div');
  d.className = 'thumb' + (i === 0 ? ' active' : '');
  d.title   = `Página ${i + 1}`;
  const img = document.createElement('img');
  img.src   = src; img.alt = '';
  img.loading = 'lazy';
  d.appendChild(img);
  d.addEventListener('click', () => go(i));
  thumbsEl.appendChild(d);
});
const thumbEls = thumbsEl.querySelectorAll('.thumb');

/* ── Sizing ── */
function resize() {
  const vw  = viewer.clientWidth;
  const vh  = viewer.clientHeight;
  const sz  = Math.floor(Math.min(vw - 72, vh - 24, 680));
  pageImg.style.width  = sz + 'px';
  pageImg.style.height = sz + 'px';
  pageImg.style.objectFit = 'contain';
}
window.addEventListener('resize', resize);
resize();

/* ── Update UI state ── */
function updateUI() {
  counter.textContent = `${cur + 1} / ${TOTAL}`;
  const first = cur <= 0;
  const last  = cur >= TOTAL - 1;
  arrowL.classList.toggle('disabled', first);
  arrowR.classList.toggle('disabled', last);
  btnFirst.classList.toggle('disabled', first);
  btnPrev.classList.toggle('disabled', first);
  btnNext.classList.toggle('disabled', last);
  btnLast.classList.toggle('disabled', last);
  thumbEls.forEach((t, i) => t.classList.toggle('active', i === cur));
  thumbEls[cur]?.scrollIntoView({inline: 'center', behavior: 'smooth', block: 'nearest'});
}

/* ── Navigate ── */
function go(to) {
  if (busy || to === cur || to < 0 || to >= TOTAL) return;
  busy = true;

  const cls = to > cur ? 'go-next' : 'go-prev';
  pageWrap.classList.add(cls);

  // Swap image at mid-point of animation
  setTimeout(() => {
    cur = to;
    pageImg.src = SRCS[cur];
    pageImg.alt = `Página ${cur + 1}`;
    updateUI();
  }, 225);

  pageWrap.addEventListener('animationend', () => {
    pageWrap.classList.remove(cls);
    busy = false;
  }, {once: true});
}

/* ── Controls ── */
arrowL.addEventListener ('click', () => go(cur - 1));
arrowR.addEventListener ('click', () => go(cur + 1));
btnFirst.addEventListener('click', () => go(0));
btnPrev.addEventListener ('click', () => go(cur - 1));
btnNext.addEventListener ('click', () => go(cur + 1));
btnLast.addEventListener ('click', () => go(TOTAL - 1));

document.getElementById('zoneLeft') .addEventListener('click', () => go(cur - 1));
document.getElementById('zoneRight').addEventListener('click', () => go(cur + 1));

/* keyboard */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  if (e.key === 'Home') go(0);
  if (e.key === 'End')  go(TOTAL - 1);
});

/* touch swipe */
let tx = 0;
viewer.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive: true});
viewer.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) dx < 0 ? go(cur + 1) : go(cur - 1);
}, {passive: true});

/* fullscreen */
btnFs.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
});
document.addEventListener('fullscreenchange', () => setTimeout(resize, 100));

updateUI();
</script>
</body>
</html>
